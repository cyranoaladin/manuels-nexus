situation_accroche: >
  Un artisan fabrique des boites en carton en decoupant des carres aux coins d'une feuille rectangulaire.
  Quel cote de carre maximise le volume de la boite ? Un probleme d'optimisation
  qui se ramene a l'etude d'un polynome du second degre.

temps_estime_h: { parcours1: 12, parcours2: 10, parcours3: 8 }
