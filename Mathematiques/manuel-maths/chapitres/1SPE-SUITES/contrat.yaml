  - { code: C2, ref_capacite: 1SPE-SUITES-C2, libelle_eleve: "Je sais montrer qu'une suite est arithmétique et exprimer son terme général." }
  - { code: C3, ref_capacite: 1SPE-SUITES-C3, libelle_eleve: "Je sais montrer qu'une suite est géométrique et exprimer son terme général." }
