situation_accroche: >
  Deux offres d'épargne : versement fixe mensuel (modèle linéaire) contre intérêts composés
  (modèle exponentiel). À partir de quand la seconde dépasse-t-elle la première ?
  Résolue au TD fil rouge avec les outils du chapitre (C2, C3, C6, C7).

