chapitre: 1SPE-GEOMETRIE-REPEREE
niveau: 1SPE
theme: GEOMETRIE-REPEREE
titre: "Géométrie repérée"
statut: draft   # draft -> valide (validation humaine LOT 0)

capacites:
  - { code: C1, ref_capacite: 1SPE-GEOREP-C1, libelle_eleve: "Je sais déterminer une équation cartésienne d'une droite ax+by+c=0 et l'exploiter." }
  - { code: C2, ref_capacite: 1SPE-GEOREP-C2, libelle_eleve: "Je sais utiliser un vecteur normal à une droite, passer d'une équation cartésienne à un vecteur directeur/normal et réciproquement." }
  - { code: C3, ref_capacite: 1SPE-GEOREP-C3, libelle_eleve: "Je sais déterminer et exploiter l'équation d'un cercle (x-a)²+(y-b)²=r²." }
  - { code: C4, ref_capacite: 1SPE-GEOREP-C4, libelle_eleve: "Je sais étudier les positions relatives de droites et de cercles (parallélisme, intersection, tangence)." }
  - { code: C5, ref_capacite: 1SPE-GEOREP-C5, libelle_eleve: "Je sais résoudre des problèmes géométriques dans un repère orthonormé." }

prerequis:
  - { code: R1, libelle: "Repérage dans le plan : coordonnées, milieu, distance", chapitre_origine: "2GT" }
  - { code: R2, libelle: "Vecteurs et coordonnées : somme, produit par un scalaire, colinéarité", chapitre_origine: "2GT" }
  - { code: R3, libelle: "Produit scalaire : calcul, orthogonalité", chapitre_origine: "1SPE-PRODUIT-SCALAIRE" }
  - { code: R4, libelle: "Équations du second degré : discriminant, racines", chapitre_origine: "1SPE-SECOND-DEGRE" }
  - { code: R5, libelle: "Systèmes d'équations linéaires à deux inconnues", chapitre_origine: "2GT" }

situation_accroche: >
  Un ingénieur doit vérifier si un câble rectiligne (modélisé par une droite) traverse
  une zone circulaire interdite (modélisée par un cercle) dans un plan cartographique.
  Comment traduire ce problème en équations et le résoudre par le calcul ?
  Résolu au TD fil rouge avec les outils du chapitre (C1, C3, C4, C5).

temps_estime_h: { parcours1: 12, parcours2: 10, parcours3: 9 }
