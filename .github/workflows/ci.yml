name: CI manuels NSI
on:
  pull_request:
    paths: ["chapitres/**", "gabarits/**", "scripts/**", "schemas/**", "referentiel/**"]
jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml jsonschema pytest ruff python-dotenv
      - run: sudo apt-get update && sudo apt-get install -y texlive-latex-extra texlive-lang-french texlive-pictures pandoc
      - name: Tests noyau + schémas META
        run: python -m pytest tests/ -q
      - name: Gate accents (R10)
        run: make accents
      - name: Gates d'exécution + compilation des chapitres modifiés
        run: |
          for chap in $(git diff --name-only origin/${{ github.base_ref }} -- chapitres | cut -d/ -f2 | sort -u); do
            python scripts/verify_python.py --chap "$chap"
            python scripts/coverage_report.py --chap "$chap" || echo "::warning::couverture incomplète $chap"
            python scripts/assemble.py --chap "$chap" --variant complet
          done
